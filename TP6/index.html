<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>JS y jQuery</title>
    <!-- CSS de Bootstrap y DataTables -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css" rel="stylesheet">
</head>
<body class="container py-4">
    <h1 id="titulo">Organizador de tareas</h1>

    <form id="tareasForm" class="mb-4">
        <div class="mb-3">
            <label class="form-label">Nombre de la tarea</label>
            <input type="text" id="tareaInput" class="form-control" placeholder="Escribe una tarea">
        </div>

        <fieldset class="mb-3">
            <legend class="fs-6">Seleccionar prioridad</legend>
            <div class="form-check form-check-inline">
                <input type="radio" name="prioridad" value="Alta" checked class="form-check-input" id="pAlta">
                <label class="form-check-label" for="pAlta">Alta</label>
            </div>
            <div class="form-check form-check-inline">
                <input type="radio" name="prioridad" value="Media" class="form-check-input" id="pMedia">
                <label class="form-check-label" for="pMedia">Media</label>
            </div>
            <div class="form-check form-check-inline">
                <input type="radio" name="prioridad" value="Baja" class="form-check-input" id="pBaja">
                <label class="form-check-label" for="pBaja">Baja</label>
            </div>
        </fieldset>

        <button type="button" id="btnAgregar" class="btn btn-primary">Agregar tarea</button>
    </form>

    <table id="tablaTareas" class="display table table-striped">
        <thead>
            <tr>
                <th>Tarea</th>
                <th>Prioridad</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="./js/script.js"></script>
</body>
</html>

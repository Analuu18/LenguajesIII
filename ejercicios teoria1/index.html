<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Resolución Ejercicios Arrays y DOM</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; max-width: 800px; margin: auto; }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; }
        .ejercicio { background: #f9f9f9; border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        .resultado { font-weight: bold; color: #27ae60; background: #e8f6ef; padding: 5px 10px; border-radius: 4px; display: inline-block; margin-top: 10px; }
        button { cursor: pointer; padding: 8px 15px; background: #3498db; color: white; border: none; border-radius: 4px; }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>

    <h1>Ejercicios de Arrays</h1>

    <div class="ejercicio">
        <h3>1. Filtrar Números Pares</h3>
        <button onclick="ejecutarPares()">Cargar y Filtrar</button>
        <div id="res-pares"></div>
    </div>

    <div class="ejercicio">
        <h3>2. Eliminar Duplicados</h3>
        <button onclick="ejecutarDuplicados()">Cargar y Limpiar</button>
        <div id="res-duplicados"></div>
    </div>

    <div class="ejercicio">
        <h3>3. Ordenar Nombres (A-Z)</h3>
        <button onclick="ejecutarOrdenar()">Cargar y Ordenar</button>
        <div id="res-ordenar"></div>
    </div>

    <div class="ejercicio">
        <h3>4. Sumar Elementos</h3>
        <button onclick="ejecutarSuma()">Cargar y Sumar</button>
        <div id="res-suma"></div>
    </div>

    <div class="ejercicio">
        <h3>5. Buscar Elemento</h3>
        <button onclick="ejecutarBusqueda()">Cargar y Buscar</button>
        <div id="res-busqueda"></div>
    </div>

    <script src="Array.js"></script>
</body>
</html>
